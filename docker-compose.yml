# LinkedIn Auto Job Applier - Docker
#
# Quick start:
#   1. Configure config/personals.py, config/secrets.py, config/search.py, etc.
#   2. Put your resume at: all resumes/default/resume.pdf
#   3. docker compose build
#   4. docker compose up
#
# For Apple Silicon Mac, linux/amd64 is required (Chrome + undetected-chromedriver).
# First run: set username/password in config/secrets.py, or log in manually in logs.
#
# Recommended config/settings.py for Docker:
#   safe_mode = True
#   pause_at_failed_question = False   (in config/questions.py)
#   pause_before_submit = False        (in config/questions.py)
#   keep_screen_awake = False

services:
  job-applier:
    build: .
    platform: linux/amd64
    shm_size: "2gb"
    volumes:
      - ./config:/app/config
      - ./all excels:/app/all excels
      - ./all resumes:/app/all resumes
      - ./logs:/app/logs
      - chrome-profile:/root/.auto-job-apply-profile
    environment:
      - DOCKER=1
    restart: "no"

  # Optional: Applied jobs history UI at http://localhost:5000
  job-applier-ui:
    build: .
    platform: linux/amd64
    profiles: ["ui"]
    ports:
      - "5000:5000"
    volumes:
      - ./config:/app/config
      - ./all excels:/app/all excels
      - ./logs:/app/logs
    command: ["ui"]
    restart: "no"

volumes:
  chrome-profile:
